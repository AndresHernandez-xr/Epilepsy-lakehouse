version: '3.8'

services:
  # S3-Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: lakehouse_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Automated bucket initialization
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin supersecretpassword;
      /usr/bin/mc mb myminio/lakehouse;
      exit 0;
      "

volumes:
  minio_data:
